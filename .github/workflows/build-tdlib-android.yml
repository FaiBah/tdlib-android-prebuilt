name: Build TDLib for Android

on:
  workflow_dispatch:
    inputs:
      tdlib_interface:
        description: 'Interface type'
        required: true
        default: 'Java'
        type: choice
        options:
          - Java
          - JSON
          - JSONJava
      tdlib_commit:
        description: 'TDLib commit hash (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build TDLib
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone TDLib & get version
        run: |
          git clone https://github.com/tdlib/td.git
          cd td

          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            git checkout ${{ github.event.inputs.tdlib_commit }}
          fi

          # Get semantic version e.g. 1.8.62
          TDLIB_VERSION=$(grep -oP '(?<=TDLib VERSION )\S+' CMakeLists.txt)

          # Get short commit hash e.g. f3a9c12
          TDLIB_COMMIT=$(git rev-parse --short HEAD)

          echo "TDLIB_VERSION=$TDLIB_VERSION" >> $GITHUB_ENV
          echo "TDLIB_COMMIT=$TDLIB_COMMIT" >> $GITHUB_ENV
          echo "TDLib version: $TDLIB_VERSION (commit: $TDLIB_COMMIT)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.event.inputs.tdlib_interface }}-${{ env.TDLIB_COMMIT }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ github.event.inputs.tdlib_interface }}-
            ${{ runner.os }}-buildx-

      - name: Build TDLib via Docker
        working-directory: td/example/android
        run: |
          COMMIT_ARG=""
          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            COMMIT_ARG="--build-arg COMMIT_HASH=${{ github.event.inputs.tdlib_commit }}"
          fi

          docker buildx build \
            --build-arg TDLIB_INTERFACE=${{ github.event.inputs.tdlib_interface }} \
            $COMMIT_ARG \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to   type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --output tdlib \
            .

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Extract tdlib.zip to repo folder
        run: |
          mkdir -p tdlib/${{ env.TDLIB_VERSION }}
          unzip td/example/android/tdlib/tdlib.zip -d tdlib/${{ env.TDLIB_VERSION }}/

      - name: Commit and push all extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add tdlib/${{ env.TDLIB_VERSION }}/

          git commit -m "Build TDLib ${{ env.TDLIB_VERSION }} (${{ env.TDLIB_COMMIT }}) [${{ github.event.inputs.tdlib_interface }}]" || echo "Nothing to commit"

          git push
