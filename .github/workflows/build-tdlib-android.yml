name: Build TDLib for Android

on:
  workflow_dispatch:
    inputs:
      tdlib_interface:
        description: 'Interface type'
        required: true
        default: 'Java'
        type: choice
        options:
          - Java
          - JSON
          - JSONJava
      tdlib_commit:
        description: 'TDLib commit hash (leave empty for latest)'
        required: false
        default: ''

jobs:
  build:
    name: Build TDLib
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Clone TDLib
        run: |
          git clone https://github.com/tdlib/td.git
          cd td
          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            git checkout ${{ github.event.inputs.tdlib_commit }}
          fi
          TDLIB_VERSION=$(git -C . rev-parse --short HEAD)
          echo "TDLIB_VERSION=$TDLIB_VERSION" >> $GITHUB_ENV
          echo "Building commit: $TDLIB_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.event.inputs.tdlib_interface }}-${{ env.TDLIB_VERSION }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ github.event.inputs.tdlib_interface }}-
            ${{ runner.os }}-buildx-

      - name: Build TDLib via Docker
        working-directory: td/example/android
        run: |
          COMMIT_ARG=""
          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            COMMIT_ARG="--build-arg COMMIT_HASH=${{ github.event.inputs.tdlib_commit }}"
          fi

          docker buildx build \
            --build-arg TDLIB_INTERFACE=${{ github.event.inputs.tdlib_interface }} \
            $COMMIT_ARG \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to   type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --output tdlib \
            .

      - name: Rotate cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Upload tdlib.zip
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-android-${{ github.event.inputs.tdlib_interface }}-${{ github.run_number }}
          path: td/example/android/tdlib/tdlib.zip
          retention-days: 30
