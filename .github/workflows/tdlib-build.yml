name: Build TDLib for Android (Release)

on:
  workflow_dispatch:
    inputs:
      tdlib_interface:
        description: 'Interface type'
        required: true
        default: 'Java'
        type: choice
        options:
          - Java
          - JSON
          - JSONJava
      tdlib_commit:
        description: 'TDLib commit hash (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build TDLib
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone TDLib & get version
        run: |
          git clone https://github.com/tdlib/td.git
          cd td

          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            git checkout ${{ github.event.inputs.tdlib_commit }}
          fi

          TDLIB_VERSION=$(grep -oP '(?<=TDLib VERSION )\S+' CMakeLists.txt)
          TDLIB_COMMIT=$(git rev-parse --short HEAD)

          if [ -z "$TDLIB_VERSION" ]; then
            echo "ERROR: TDLIB_VERSION is empty!"
            exit 1
          fi

          echo "TDLIB_VERSION=$TDLIB_VERSION" >> $GITHUB_ENV
          echo "TDLIB_COMMIT=$TDLIB_COMMIT" >> $GITHUB_ENV
          echo "TDLib version: $TDLIB_VERSION (commit: $TDLIB_COMMIT)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.event.inputs.tdlib_interface }}-${{ env.TDLIB_COMMIT }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ github.event.inputs.tdlib_interface }}-
            ${{ runner.os }}-buildx-

      - name: Build TDLib via Docker
        working-directory: td/example/android
        run: |
          COMMIT_ARG=""
          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            COMMIT_ARG="--build-arg COMMIT_HASH=${{ github.event.inputs.tdlib_commit }}"
          fi

          docker buildx build \
            --build-arg TDLIB_INTERFACE=${{ github.event.inputs.tdlib_interface }} \
            $COMMIT_ARG \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to   type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --output tdlib \
            .

      - name: Rotate cache
        if: success()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Verify & extract tdlib.zip
        run: |
          if [ ! -f td/example/android/tdlib/tdlib.zip ]; then
            echo "ERROR: tdlib.zip not found!"
            exit 1
          fi

          mkdir -p tdlib/${{ env.TDLIB_VERSION }}
          unzip -o td/example/android/tdlib/tdlib.zip -d tdlib/${{ env.TDLIB_VERSION }}/

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Package per ABI zip (so + java sources)
        run: |
          VERSION=${{ env.TDLIB_VERSION }}
          EXTRACTED=tdlib/$VERSION/tdlib
          JAVA_DIR=$EXTRACTED/java
          LIBS_DIR=$EXTRACTED/libs

          for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
            echo "Packaging $ABI..."
            mkdir -p /tmp/tdlib-$ABI/libs/$ABI
            mkdir -p /tmp/tdlib-$ABI/java

            cp $LIBS_DIR/$ABI/libtdjni.so /tmp/tdlib-$ABI/libs/$ABI/
            cp -r $JAVA_DIR/. /tmp/tdlib-$ABI/java/

            cd /tmp/tdlib-$ABI
            zip -r /tmp/tdlib-$ABI.zip .
            cd -
          done

          echo "All ABI zips created:"
          ls -lah /tmp/tdlib-*.zip

      - name: Build tdlib.jar
        run: |
          VERSION=${{ env.TDLIB_VERSION }}
          JAVA_SRC=tdlib/$VERSION/tdlib/java

          mkdir -p /tmp/jar-classes

          # Compile .java → .class
          find $JAVA_SRC -name "*.java" | xargs javac \
            -source 8 -target 8 \
            -d /tmp/jar-classes

          # Package .class → .jar
          cd /tmp/jar-classes
          jar cf /tmp/tdlib.jar .
          cd -

          echo "tdlib.jar created:"
          ls -lah /tmp/tdlib.jar

      - name: Build tdlib.aar
        run: |
          VERSION=${{ env.TDLIB_VERSION }}
          EXTRACTED=tdlib/$VERSION/tdlib
          JAVA_SRC=$EXTRACTED/java
          LIBS_DIR=$EXTRACTED/libs

          mkdir -p /tmp/aar-build/jni
          mkdir -p /tmp/aar-classes

          # Compile .java → .class → classes.jar
          find $JAVA_SRC -name "*.java" | xargs javac \
            -source 8 -target 8 \
            -d /tmp/aar-classes

          cd /tmp/aar-classes
          jar cf /tmp/aar-build/classes.jar .
          cd -

          # Copy .so files per ABI
          for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
            mkdir -p /tmp/aar-build/jni/$ABI
            cp $LIBS_DIR/$ABI/libtdjni.so /tmp/aar-build/jni/$ABI/
          done

          # Create AndroidManifest.xml
          cat > /tmp/aar-build/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="org.drinkless.tdlib">
          </manifest>
          EOF

          # Package everything → .aar (aar is just a zip)
          cd /tmp/aar-build
          zip -r /tmp/tdlib.aar .
          cd -

          echo "tdlib.aar created:"
          ls -lah /tmp/tdlib.aar

      - name: Commit and push all extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main

          git add tdlib/${{ env.TDLIB_VERSION }}/

          git commit -m "Build TDLib ${{ env.TDLIB_VERSION }} (${{ env.TDLIB_COMMIT }}) [${{ github.event.inputs.tdlib_interface }}]" || echo "Nothing to commit"

          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TDLIB_VERSION }}-${{ github.event.inputs.tdlib_interface }}
          name: TDLib ${{ env.TDLIB_VERSION }} [${{ github.event.inputs.tdlib_interface }}]
          make_latest: true
          body: |
            ## TDLib ${{ env.TDLIB_VERSION }} — Android Prebuilt

            | | |
            |---|---|
            | **Version** | ${{ env.TDLIB_VERSION }} |
            | **Commit** | ${{ env.TDLIB_COMMIT }} |
            | **Interface** | ${{ github.event.inputs.tdlib_interface }} |

            ## Download
            | File | Contains | Use case |
            |---|---|---|
            | `tdlib.zip` | all `.so` + java sources | manual setup |
            | `tdlib-debug.zip` | all `.so` debug + java sources | debugging |
            | `tdlib.jar` | compiled java sources only | java library |
            | `tdlib.aar` | all `.so` + compiled java | android library ✅ |
            | `tdlib-arm64-v8a.zip` | `libtdjni.so` + java sources | arm64 only |
            | `tdlib-armeabi-v7a.zip` | `libtdjni.so` + java sources | armeabi only |
            | `tdlib-x86.zip` | `libtdjni.so` + java sources | x86 only |
            | `tdlib-x86_64.zip` | `libtdjni.so` + java sources | x86_64 only |

            ## Quickest way to use (aar)
            ```groovy
            // build.gradle
            implementation files('libs/tdlib.aar')
            ```

            ## Manual setup (zip)
            ```
            app/src/main/
            ├── jniLibs/
            │   └── arm64-v8a/libtdjni.so
            └── java/org/drinkless/tdlib/
                ├── Client.java
                └── TdApi.java
            ```
          files: |
            td/example/android/tdlib/tdlib.zip
            td/example/android/tdlib/tdlib-debug.zip
            /tmp/tdlib.jar
            /tmp/tdlib.aar
            /tmp/tdlib-arm64-v8a.zip
            /tmp/tdlib-armeabi-v7a.zip
            /tmp/tdlib-x86.zip
            /tmp/tdlib-x86_64.zip
