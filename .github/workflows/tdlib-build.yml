name: Build TDLib for Android (Release)

on:
  workflow_dispatch:
    inputs:
      tdlib_interface:
        description: 'Interface type'
        required: true
        default: 'Java'
        type: choice
        options:
          - Java
          - JSON
          - JSONJava
          - All
      tdlib_commit:
        description: 'TDLib commit hash (leave empty for latest)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare build matrix
    runs-on: ubuntu-22.04
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set matrix
        id: set-matrix
        run: |
          if [ "${{ github.event.inputs.tdlib_interface }}" = "All" ]; then
            echo 'matrix=["Java","JSON","JSONJava"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["${{ github.event.inputs.tdlib_interface }}"]' >> $GITHUB_OUTPUT
          fi

  build:
    name: Build TDLib [${{ matrix.interface }}]
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        interface: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Clone TDLib & get version
        run: |
          git clone https://github.com/tdlib/td.git
          cd td

          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            git checkout ${{ github.event.inputs.tdlib_commit }}
          fi

          TDLIB_VERSION=$(grep -oP '(?<=TDLib VERSION )\S+' CMakeLists.txt)
          TDLIB_COMMIT=$(git rev-parse --short HEAD)

          if [ -z "$TDLIB_VERSION" ]; then
            echo "ERROR: TDLIB_VERSION is empty!"
            exit 1
          fi

          echo "TDLIB_VERSION=$TDLIB_VERSION" >> $GITHUB_ENV
          echo "TDLIB_COMMIT=$TDLIB_COMMIT" >> $GITHUB_ENV
          echo "TDLib version: $TDLIB_VERSION (commit: $TDLIB_COMMIT)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.interface }}-${{ env.TDLIB_COMMIT }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.interface }}-
            ${{ runner.os }}-buildx-

      - name: Build TDLib via Docker
        working-directory: td/example/android
        run: |
          COMMIT_ARG=""
          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            COMMIT_ARG="--build-arg COMMIT_HASH=${{ github.event.inputs.tdlib_commit }}"
          fi

          docker buildx build \
            --build-arg TDLIB_INTERFACE=${{ matrix.interface }} \
            $COMMIT_ARG \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to   type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --output tdlib \
            .

      - name: Rotate cache
        if: success()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Verify & extract tdlib.zip
        run: |
          if [ ! -f td/example/android/tdlib/tdlib.zip ]; then
            echo "ERROR: tdlib.zip not found!"
            exit 1
          fi

          mkdir -p /tmp/tdlib-extract
          unzip -o td/example/android/tdlib/tdlib.zip -d /tmp/tdlib-extract/

          mkdir -p tdlib/v${{ env.TDLIB_VERSION }}/${{ matrix.interface }}
          cp -r /tmp/tdlib-extract/tdlib/. tdlib/v${{ env.TDLIB_VERSION }}/${{ matrix.interface }}/
          rm -rf /tmp/tdlib-extract

          echo "=== Final structure ==="
          find tdlib/v${{ env.TDLIB_VERSION }}/${{ matrix.interface }} -type f

      - name: Package per ABI zip (so + java sources)
        run: |
          EXTRACTED=tdlib/v${{ env.TDLIB_VERSION }}/${{ matrix.interface }}
          LIBS_DIR=$EXTRACTED/libs

          SO_FILE=$(find $LIBS_DIR/arm64-v8a -name "*.so" -printf "%f\n" | head -1)
          echo "Detected .so file: $SO_FILE"

          for ABI in arm64-v8a armeabi-v7a x86 x86_64; do
            echo "Packaging $ABI..."
            mkdir -p /tmp/tdlib-$ABI/libs/$ABI

            cp $LIBS_DIR/$ABI/$SO_FILE /tmp/tdlib-$ABI/libs/$ABI/

            if [ -d "$EXTRACTED/java" ]; then
              mkdir -p /tmp/tdlib-$ABI/java
              cp -r $EXTRACTED/java/. /tmp/tdlib-$ABI/java/
            fi

            cd /tmp/tdlib-$ABI
            zip -r /tmp/tdlib-$ABI.zip .
            cd -
          done

          echo "All ABI zips created:"
          ls -lah /tmp/tdlib-*.zip

      - name: Commit and push all extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add tdlib/v${{ env.TDLIB_VERSION }}/

          # Retry up to 5 times to handle parallel push conflicts
          for i in 1 2 3 4 5; do
            echo "Push attempt $i..."
            git pull --rebase origin main || true
            git add tdlib/v${{ env.TDLIB_VERSION }}/
            git commit -m "Build TDLib ${{ env.TDLIB_VERSION }} (${{ env.TDLIB_COMMIT }}) [${{ matrix.interface }}]" || echo "Nothing to commit"
            git push && echo "Push successful!" && break
            echo "Push failed, retrying in 5 seconds..."
            sleep 5
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.TDLIB_VERSION }}-${{ matrix.interface }}
          name: TDLib ${{ env.TDLIB_VERSION }} [${{ matrix.interface }}]
          make_latest: true
          body: |
            ## TDLib ${{ env.TDLIB_VERSION }} — Android Prebuilt

            | | |
            |---|---|
            | **Version** | ${{ env.TDLIB_VERSION }} |
            | **Commit** | ${{ env.TDLIB_COMMIT }} |
            | **Interface** | ${{ matrix.interface }} |

            ## Download
            | File | Contains | ABI |
            |---|---|---|
            | `tdlib.zip` | all `.so` + java sources | all |
            | `tdlib-debug.zip` | all `.so` debug + java sources | all |
            | `tdlib-arm64-v8a.zip` | `.so` + java sources | arm64-v8a |
            | `tdlib-armeabi-v7a.zip` | `.so` + java sources | armeabi-v7a |
            | `tdlib-x86.zip` | `.so` + java sources | x86 |
            | `tdlib-x86_64.zip` | `.so` + java sources | x86_64 |

            ## Usage
            Extract any zip and copy into your Android project:
            ```
            app/src/main/
            ├── jniLibs/
            │   └── arm64-v8a/libtdjni.so
            └── java/org/drinkless/tdlib/
                ├── Client.java
                └── TdApi.java
            ```
          files: |
            td/example/android/tdlib/tdlib.zip
            td/example/android/tdlib/tdlib-debug.zip
            /tmp/tdlib-arm64-v8a.zip
            /tmp/tdlib-armeabi-v7a.zip
            /tmp/tdlib-x86.zip
            /tmp/tdlib-x86_64.zip
