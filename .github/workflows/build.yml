name: Build TDLib ARM64 Android

on:
  push:
    branches:
      - main

jobs:
  build-arm64:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK: /usr/local/lib/android/ndk

    steps:
    - name: Checkout TDLib
      uses: actions/checkout@v3

    - name: Setup Android NDK
      uses: android-actions/setup-ndk@v2
      with:
        ndk-version: r25b

    - name: Install CMake
      run: sudo apt-get update && sudo apt-get install cmake -y

    - name: Build TDLib for ARM64
      run: |
        git clone --branch v1.8.33 https://github.com/tdlib/td.git tdlib
        mkdir -p tdlib/build-arm64
        cd tdlib/build-arm64
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-33 \
          -DCMAKE_BUILD_TYPE=Release \
          -DTD_ENABLE_JNI=ON \
          -DCMAKE_INSTALL_PREFIX=../tdlib-java
        cmake --build . --target install -- -j$(nproc)

    - name: Upload ARM64 artifacts
      uses: actions/upload-artifact@v3
      with:
        name: tdlib-arm64
        path: tdlib/tdlib-java
