name: Build TDLib JAR

on:
  workflow_dispatch:
    inputs:
      tdlib_commit:
        description: 'TDLib commit hash (leave empty for latest)'
        required: false
        default: ''

jobs:
  build:
    name: Build TDLib [Java]
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Get latest TDLib version without full clone
        run: |
          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            TDLIB_COMMIT_SHORT="${{ github.event.inputs.tdlib_commit }}"
          else
            TDLIB_COMMIT=$(git ls-remote https://github.com/tdlib/td.git HEAD | cut -f1)
            TDLIB_COMMIT_SHORT=${TDLIB_COMMIT::7}
          fi
          echo "TDLIB_COMMIT_SHORT=$TDLIB_COMMIT_SHORT" >> $GITHUB_ENV

      - name: Clone TDLib & get version
        run: |
          git clone https://github.com/tdlib/td.git
          cd td

          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            git checkout ${{ github.event.inputs.tdlib_commit }}
          fi

          TDLIB_VERSION=$(grep -oP '(?<=TDLib VERSION )\S+' CMakeLists.txt)
          TDLIB_COMMIT=$(git rev-parse --short HEAD)

          if [ -z "$TDLIB_VERSION" ]; then
            echo "ERROR: TDLIB_VERSION is empty!"
            exit 1
          fi

          echo "TDLIB_VERSION=$TDLIB_VERSION" >> $GITHUB_ENV
          echo "TDLIB_COMMIT=$TDLIB_COMMIT" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-Java-${{ env.TDLIB_COMMIT }}
          restore-keys: |
            ${{ runner.os }}-buildx-Java-
            ${{ runner.os }}-buildx-

      - name: Build TDLib via Docker
        working-directory: td/example/android
        run: |
          COMMIT_ARG=""
          if [ -n "${{ github.event.inputs.tdlib_commit }}" ]; then
            COMMIT_ARG="--build-arg COMMIT_HASH=${{ github.event.inputs.tdlib_commit }}"
          fi

          docker buildx build \
            --build-arg TDLIB_INTERFACE=Java \
            $COMMIT_ARG \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to   type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --output tdlib \
            .

      - name: Rotate cache
        if: success()
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Verify & extract tdlib.zip
        run: |
          if [ ! -f td/example/android/tdlib/tdlib.zip ]; then
            echo "ERROR: tdlib.zip not found!"
            exit 1
          fi

          mkdir -p /tmp/tdlib-extract
          unzip -o td/example/android/tdlib/tdlib.zip -d /tmp/tdlib-extract/

          mkdir -p tdlib/v${{ env.TDLIB_VERSION }}/Java
          cp -r /tmp/tdlib-extract/tdlib/. tdlib/v${{ env.TDLIB_VERSION }}/Java/
          rm -rf /tmp/tdlib-extract

          echo "=== Final structure ==="
          find tdlib/v${{ env.TDLIB_VERSION }}/Java -type f
        
      - name: Compile TdApi & Client to JAR
        run: |
          # Download androidx.annotation-jvm (plain JAR, no AAR extraction needed)
          wget -q "https://maven.google.com/androidx/annotation/annotation-jvm/1.7.0/annotation-jvm-1.7.0.jar" -O annotation.jar

          JAVA_SRC=tdlib/v${{ env.TDLIB_VERSION }}/Java/java/org/drinkless/tdlib
          mkdir -p build/classes
          javac -cp annotation.jar -proc:none -d build/classes \
            $JAVA_SRC/TdApi.java \
            $JAVA_SRC/Client.java
          jar cf tdlib-java.jar -C build/classes .

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: tdlib-java
          path: tdlib-java.jar
